<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공항 마샬링 프로토타입 2 - 시야 기반</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #222;
    color: #eee;
    font-family: sans-serif;
    overflow: hidden;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 16px;
    line-height: 1.6;
  }
  #recognized {
    font-weight: bold;
  }
  #recognized.in-view { color: #4dff88; }
  #recognized.out-view { color: #ff6b6b; }
  #selected {
    font-weight: bold;
    color: #ffd34d;
  }
  #buttons {
    position: absolute;
    bottom: 10px;
    left: 10px;
  }
  #buttons button {
    font-size: 15px;
    padding: 10px 16px;
    margin-right: 6px;
    cursor: pointer;
  }
  #buttons button.active {
    outline: 3px solid #ffd34d;
  }
  #restart {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 16px;
    padding: 8px 16px;
    cursor: pointer;
  }
  #success {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    font-weight: bold;
    color: #4dff88;
    text-shadow: 0 0 12px #000;
    display: none;
  }
  #gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    font-weight: bold;
    color: #ff4d4d;
    text-shadow: 0 0 12px #000;
    display: none;
  }
  #help {
    position: absolute;
    bottom: 70px;
    left: 10px;
    font-size: 14px;
    color: #aaa;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="ui">
  비행기 인식: <span id="recognized" class="out-view">시야 밖</span><br>
  선택한 신호: <span id="selected">STOP</span>
</div>
<button id="restart">재시작</button>
<div id="success">SUCCESS</div>
<div id="gameover">GAME OVER</div>
<div id="help">WASD = 마샬러 이동 / 비행기 부채꼴 시야 안에서 버튼 클릭 시 신호 인식</div>
<div id="buttons">
  <button data-signal="FORWARD">FORWARD</button>
  <button data-signal="STOP">STOP</button>
  <button data-signal="TURN_LEFT">TURN_LEFT</button>
  <button data-signal="TURN_RIGHT">TURN_RIGHT</button>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const recognizedLabel = document.getElementById('recognized');
const selectedLabel = document.getElementById('selected');
const successLabel = document.getElementById('success');
const gameoverLabel = document.getElementById('gameover');
const restartBtn = document.getElementById('restart');
const buttons = document.querySelectorAll('#buttons button');

const SIGNALS = {
  FORWARD: 'FORWARD',
  STOP: 'STOP',
  TURN_LEFT: 'TURN_LEFT',
  TURN_RIGHT: 'TURN_RIGHT'
};

const MOVE_KEYS = {
  'w': { dx: 0, dy: -1 },
  's': { dx: 0, dy: 1 },
  'a': { dx: -1, dy: 0 },
  'd': { dx: 1, dy: 0 }
};

const PLANE_SPEED = 45;          // px/sec
const TURN_RATE = Math.PI / 4;   // rad/sec
const PLANE_SIZE = 26;
const MARSHALLER_SPEED = 180;    // px/sec
const MARSHALLER_RADIUS = 10;
const COLLISION_DISTANCE = PLANE_SIZE * 0.6 + MARSHALLER_RADIUS;

const VIEW_HALF_ANGLE = (35 * Math.PI) / 180; // 총 70도 부채꼴
const VIEW_RANGE = 260;

const PARKING = {
  x: 560,
  y: 150,
  w: 140,
  h: 100,
  targetAngle: 0 // 동쪽을 바라봐야 함
};
const ANGLE_TOLERANCE = (15 * Math.PI) / 180;

let plane;
let marshaller;
let selectedSignal = SIGNALS.STOP;
let recognizedSignal = SIGNALS.STOP;
let inView = false;
let success = false;
let gameOver = false;
let lastTime = null;
const keysDown = {};

function initState() {
  plane = { x: 200, y: 480, angle: -Math.PI / 2 };
  marshaller = { x: 400, y: 350 };
  selectedSignal = SIGNALS.STOP;
  recognizedSignal = SIGNALS.STOP;
  inView = false;
  success = false;
  gameOver = false;
  successLabel.style.display = 'none';
  gameoverLabel.style.display = 'none';
  selectedLabel.textContent = selectedSignal;
  updateButtonHighlight();
}

function normalizeAngleDiff(a) {
  let diff = a % (Math.PI * 2);
  if (diff > Math.PI) diff -= Math.PI * 2;
  if (diff < -Math.PI) diff += Math.PI * 2;
  return diff;
}

function checkInView() {
  const dx = marshaller.x - plane.x;
  const dy = marshaller.y - plane.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > VIEW_RANGE) return false;
  const angleToMarshaller = Math.atan2(dy, dx);
  const diff = Math.abs(normalizeAngleDiff(angleToMarshaller - plane.angle));
  return diff <= VIEW_HALF_ANGLE;
}

function updateMarshaller(dt) {
  let dx = 0, dy = 0;
  for (const key in MOVE_KEYS) {
    if (keysDown[key]) {
      dx += MOVE_KEYS[key].dx;
      dy += MOVE_KEYS[key].dy;
    }
  }
  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    marshaller.x += (dx / len) * MARSHALLER_SPEED * dt;
    marshaller.y += (dy / len) * MARSHALLER_SPEED * dt;
  }
  marshaller.x = Math.max(MARSHALLER_RADIUS, Math.min(canvas.width - MARSHALLER_RADIUS, marshaller.x));
  marshaller.y = Math.max(MARSHALLER_RADIUS, Math.min(canvas.height - MARSHALLER_RADIUS, marshaller.y));
}

function updatePlane(dt) {
  if (recognizedSignal === SIGNALS.STOP) {
    return;
  }
  if (recognizedSignal === SIGNALS.TURN_LEFT) {
    plane.angle -= TURN_RATE * dt;
  } else if (recognizedSignal === SIGNALS.TURN_RIGHT) {
    plane.angle += TURN_RATE * dt;
  }
  plane.x += Math.cos(plane.angle) * PLANE_SPEED * dt;
  plane.y += Math.sin(plane.angle) * PLANE_SPEED * dt;
}

function checkWallCollision() {
  const margin = PLANE_SIZE * 0.6;
  if (
    plane.x - margin <= 0 ||
    plane.x + margin >= canvas.width ||
    plane.y - margin <= 0 ||
    plane.y + margin >= canvas.height
  ) {
    gameOver = true;
    gameoverLabel.style.display = 'block';
  }
}

function checkCollision() {
  const dx = plane.x - marshaller.x;
  const dy = plane.y - marshaller.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist <= COLLISION_DISTANCE) {
    gameOver = true;
    gameoverLabel.style.display = 'block';
  }
}

function checkSuccess() {
  const inZone =
    plane.x >= PARKING.x &&
    plane.x <= PARKING.x + PARKING.w &&
    plane.y >= PARKING.y &&
    plane.y <= PARKING.y + PARKING.h;
  const angleDiff = Math.abs(normalizeAngleDiff(plane.angle - PARKING.targetAngle));
  if (inZone && angleDiff <= ANGLE_TOLERANCE) {
    success = true;
    successLabel.style.display = 'block';
  }
}

function update(dt) {
  if (success || gameOver) return;

  updateMarshaller(dt);

  inView = checkInView();
  recognizedLabel.textContent = inView ? '시야 안' : '시야 밖';
  recognizedLabel.className = inView ? 'in-view' : 'out-view';
  if (inView) {
    recognizedSignal = selectedSignal;
  }

  updatePlane(dt);
  checkWallCollision();
  if (gameOver) return;
  checkCollision();
  if (gameOver) return;
  checkSuccess();
}

function drawViewCone() {
  ctx.save();
  ctx.translate(plane.x, plane.y);
  ctx.rotate(plane.angle);
  ctx.fillStyle = inView ? 'rgba(77,255,136,0.18)' : 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, VIEW_RANGE, -VIEW_HALF_ANGLE, VIEW_HALF_ANGLE);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawViewCone();

  // 주차 구역
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(PARKING.x, PARKING.y, PARKING.w, PARKING.h);
  const cx = PARKING.x + PARKING.w / 2;
  const cy = PARKING.y + PARKING.h / 2;
  ctx.strokeStyle = '#145a32';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx - 30, cy);
  ctx.lineTo(cx + 30, cy);
  ctx.lineTo(cx + 18, cy - 10);
  ctx.moveTo(cx + 30, cy);
  ctx.lineTo(cx + 18, cy + 10);
  ctx.stroke();

  // 비행기
  ctx.save();
  ctx.translate(plane.x, plane.y);
  ctx.rotate(plane.angle);
  ctx.fillStyle = success ? '#4dff88' : (gameOver ? '#ff4d4d' : '#ecf0f1');
  ctx.beginPath();
  ctx.moveTo(PLANE_SIZE, 0);
  ctx.lineTo(-PLANE_SIZE * 0.6, PLANE_SIZE * 0.6);
  ctx.lineTo(-PLANE_SIZE * 0.6, -PLANE_SIZE * 0.6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 마샬러
  ctx.fillStyle = inView ? '#ffd34d' : '#3498db';
  ctx.beginPath();
  ctx.arc(marshaller.x, marshaller.y, MARSHALLER_RADIUS, 0, Math.PI * 2);
  ctx.fill();
}

function loop(timestamp) {
  if (lastTime === null) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

function updateButtonHighlight() {
  buttons.forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.signal === selectedSignal);
  });
}

window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (MOVE_KEYS[key]) keysDown[key] = true;
});
window.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  if (MOVE_KEYS[key]) keysDown[key] = false;
});

buttons.forEach((btn) => {
  btn.addEventListener('click', () => {
    selectedSignal = btn.dataset.signal;
    selectedLabel.textContent = selectedSignal;
    updateButtonHighlight();
  });
});

restartBtn.addEventListener('click', initState);

initState();
requestAnimationFrame(loop);
</script>

</body>
</html>
